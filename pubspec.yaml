name: inglishapp
description: "InglishApp - Gamified English Learning Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.3
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatars/
    - assets/icons/
